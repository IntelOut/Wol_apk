[tool.ruff]
target-version = "py313"
src = ["."]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "N"]
ignore = ["E501"]

[tool.pylint.main]
disable = [
    "C0114", "C0115", "C0116",
    "E0401", "E0611",
    "E1101", "E1121", "E1123",
    "R0902", "R0903", "R0914", "R0915", "R1705",
    "W0212", "W0621", "W0613", "W0703",
    "C0301", "C0327", "C0415", "R0801",
]
good-names = ["i", "j", "k", "e", "_", "ex", "fp", "fn"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

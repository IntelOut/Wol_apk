repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: python -m mypy main.py wol_app/
        language: system
        types: [python]
        pass_filenames: false

  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: python -m pylint main.py wol_app/ tests/
        language: system
        types: [python]
        pass_filenames: false

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest tests/ -q
        language: system
        types: [python]
        pass_filenames: false
        env:
          PYTHONPATH: "."

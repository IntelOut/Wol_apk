name: Release Canary / Beta

on:
  push:
    tags:
      - "v*-rc*"

permissions:
  contents: write

jobs:
  build-canary:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            /home/runner/.gradle/caches
            /home/runner/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Flutter SDK + Dart Pub
        uses: actions/cache@v5
        with:
          path: |
            /home/runner/.pub-cache
            ~/flutter
          key: ${{ runner.os }}-flutter-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Cache Android SDK extras
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/lib/android/sdk/build-tools
            /usr/local/lib/android/sdk/platforms
            /usr/local/lib/android/sdk/cmdline-tools
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('requirements.txt') }}

      - name: Extract version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          # v0.7.1-rc1-android -> 0.7.1-rc1
          VERSION="${TAG#v}"
          # Remove suffix after last dash containing platform hint
          VERSION="${VERSION%-android}"
          VERSION="${VERSION%-windows}"
          echo "BUILD_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Build APK (canary)
        run: |
          flet build apk --yes \
            --build-version ${{ env.BUILD_VERSION }} \
            --build-number ${{ github.run_number }} \
            --org com.intelout.wol

      - name: Smoke test — verify APK exists
        run: |
          if ls build/apk/*.apk 1>/dev/null 2>&1; then
            echo "Canary APK:"
            ls -lh build/apk/*.apk
          else
            echo "ERROR: No APK found"
            exit 1
          fi

      - name: Create Pre-release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: build/apk/*.apk
          prerelease: true
          generate_release_notes: true

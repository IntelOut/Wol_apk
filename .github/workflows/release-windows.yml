name: Release Windows

on:
  push:
    tags:
      - "v*windows*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: Build Windows executable
        env:
          FLET_CLI_NO_RICH_OUTPUT: "true"
        run: |
          flet build windows --build-version $env:GITHUB_REF_NAME.Split('-')[0].Substring(1) --project-name WakeOnLAN

      - name: Smoke test — verify build output exists
        shell: pwsh
        run: |
          $buildDir = "build\windows"
          if (Test-Path $buildDir) {
            Get-ChildItem -Path $buildDir -Recurse -File | Select-Object -First 10
            Write-Host "Build output found at $buildDir"
          } else {
            Write-Error "ERROR: Build output not found at $buildDir"
            exit 1
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: build/windows/**/*
          generate_release_notes: true

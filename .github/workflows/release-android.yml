name: Release Android

on:
  push:
    tags:
      - "v*android*"

permissions:
  contents: write

env:
  GRADLE_USER_HOME: /home/runner/.gradle
  PUB_CACHE: /home/runner/.pub-cache

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.GRADLE_USER_HOME }}/caches
            ${{ env.GRADLE_USER_HOME }}/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Flutter SDK + Dart Pub
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.PUB_CACHE }}
            ~/flutter
          key: ${{ runner.os }}-flutter-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Cache Android SDK extras
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/lib/android/sdk/build-tools
            /usr/local/lib/android/sdk/platforms
            /usr/local/lib/android/sdk/cmdline-tools
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('requirements.txt') }}

      - name: Build APK
        run: |
          flet build apk --yes \
            --build-version ${GITHUB_REF_NAME%%-*} \
            --build-number ${{ github.run_number }} \
            --org com.intelout.wol

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: build/apk/*.apk
          generate_release_notes: true

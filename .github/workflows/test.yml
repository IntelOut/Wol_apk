name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
      - name: Lint with ruff
        run: |
          ruff check .
      - name: Type check with mypy
        run: |
          mypy main.py wol_app/
      - name: Lint with pylint
        run: |
          pylint main.py wol_app/ tests/test_main.py
      - name: Run tests
        run: |
          PYTHONPATH=. pytest tests/ --cov=wol_app --cov-report=term-missing -v

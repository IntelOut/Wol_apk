name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
      - name: Lint with ruff
        run: |
          ruff check .
      - name: Type check with mypy
        run: |
          mypy main.py wol_app/
      - name: Lint with pylint
        run: |
          pylint main.py wol_app/ tests/
      - name: Run tests
        run: |
          PYTHONPATH=. pytest tests/ --cov=wol_app --cov-report=term-missing --html=tests/reports/report.html --self-contained-html -v
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.os }}-py${{ matrix.python-version }}
          path: tests/reports/
